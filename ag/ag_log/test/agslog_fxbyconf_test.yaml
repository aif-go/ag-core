aglog:
  # topHandler: [zap1,zap2,fanout1]
  topHandler: 
    - "zap1"
    - "zap2"
    - "f1"
  
  fanout:
    logs:
      f1: ["zap1","zap2"]
      f2: ["f1"]
      f3: ["f2"]
  zap:
    logs:
      zap1:
        log_level: info
        encoding: console           # json or console
        # log_file_name: "logs/hhhzzzwww.log"
        # max_backups: 30
        # max_age: 7
        # max_size: 1024
        compress: true
        console: true
      zap2:
        log_level: debug
        encoding: console           # json or console
        # log_file_name: "logs/hhhzzzwww2.log"
        # max_backups: 30
        # max_age: 7
        # max_size: 1024
        compress: true
        console: true

log:
  - log_level: debug
    encoding: console           # json or console
    log_file_name: "./storage/logs/server.log"
    max_backups: 30
    max_age: 7
    max_size: 1024
    compress: true
    log_type: tradeinfo
  - log_level: debug
    encoding: console           # json or console
    log_file_name: "./storage/logs/server.log"
    max_backups: 30
    max_age: 7
    max_size: 1024
    compress: true
    log_type: rpc
  - log_level: debug
    encoding: console           # json or console
    log_file_name: "./storage/logs/heartbeat.log"
    max_backups: 30
    max_age: 7
    max_size: 1024
    compress: true
    log_type: heartbeat

aglog:
  group: "rootgroup"
  fanout:
    group: "fanoutgroup"
    handlers:
      - zap1
      - zap2
  failover:
    group: "failovergroup"
    handlers:
      - zap2
  zap:
    logs:
      zap1:
        loglevel: "debug"
      zap2:
        loglevel: "info"
  slog:
    logs:
      slog1:
        level: "debug"
  aglogp:
    aglog1:
      level: "debug"
# 数据库表结构与查询规则定义
database_table:
  table_name: xxx
  table_comment: 业务表描述（可选）

  columns:
    ACCT_NO:
      db_column: xx
      go_type: time.Time
      comment: xxx
      primary_key: false
      not_null: true
      length: "12"
      default_value: ""
      description: "///@create"
      auto_increment: false

    ACCT_TYPE:
      db_column: yy
      go_type: string
      comment: 账户类型
      primary_key: true
      not_null: true

  primary_keys:
    - column: ACCT_NO
    - column: ACCT_TYPE

  # 核心优化：索引扁平化（移除bind_columns，直接用columns）
  indexes:
    general:
      - index_name: idx_acct_no
        columns: [xx]          # 单层列表，支持多列：[xx, yy, zz]
    unique:
      - index_name: uk_acct_type
        columns: [yy]

self_query_rules:
  FindSelfColMethod1:
    select_fields: A,B,C,D
    aggregation:
      function: SUM(*) AS XXX
      result_type: int
    order_by: A,B
    where:
      operator: OR
      conditions:
        - operator: AND
          conditions:
            - expr: A = @A
            - expr: B = @B
        - operator: AND
          conditions:
            - expr: C = @C
            - expr: D = @D

  FindSelfColMethod2:
    select_fields: E,F,G,H
    order_by: E,F
    where:
      operator: OR
      conditions:
        - operator: AND
          conditions:
            - expr: E = @E
            - expr: F = @F
        - operator: AND
          conditions:
            - expr: G = @G
            - expr: H = @H
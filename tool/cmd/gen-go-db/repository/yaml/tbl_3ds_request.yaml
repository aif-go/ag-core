table_name: tbl_3ds_request
columns:
- name: ID
  type: int64
  not_null: true
  auto_increment: false
  support_update: false
  description: 数据表自增长ID(@readonly@)
- name: CLUSTER_ID
  type: string
  length: "2"
  not_null: true
  default: 1A
  auto_increment: false
  support_update: true
  description: 在线库集群ID(第一位：集群ID（使用1-9）；第二位：表ID（取值A/B）。@readonly@)
- name: TRANSACTION_TYPE
  type: string
  length: "2"
  not_null: true
  auto_increment: false
  support_update: true
  description: 交易类型(01-DCC预支付,02-消费,03-消费撤销,04-消费冲正，05-消费撤销冲正（暂不支持），06-预授权，07-预授权撤销，08-预授权冲正，09-预授权撤销冲正（暂不支持），10-预授权完成，11-预授权完成撤销，12-预授权完成冲正，13-预授权完成撤销冲正（暂不支持），14-账户验证，20-退货；50-交易状态查询，61-3DS认证初始化,62-3DS认证，63-3DS认证挑战；81-拒付，82-再请款，83-收费，84-付费,85-拒付撤销，86-再请款撤销，87-收单行收费，88-收单行付费；90-回响测试，91-签到，92-签退，93-密钥切换，94-RECON，95-风险报告，96-文本通知（或有）。@enumType=com.allinfinance.marcopolo.enums.TransactionType@)
- name: ORDER_ID
  type: string
  length: "24"
  not_null: true
  auto_increment: false
  support_update: true
  description: 商户交易订单号
- name: GATEWAY_SERVICE_KEY
  type: string
  length: "64"
  not_null: true
  auto_increment: false
  support_update: true
  description: 网关微服务ID，全局跟踪号的第一部分(IP:Port#微服务ID)
- name: GLOBAL_TRACE_NO
  type: string
  length: "32"
  not_null: true
  auto_increment: false
  support_update: true
  description: 全局跟踪号第二部分，也用于同步转异步Key(与网关ID配合使用，YYYYMMDDHHMMSSmmm+10序列号)
- name: PAN
  type: string
  length: "64"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD2(存储加密)
- name: PROCESSING_CODE
  type: string
  length: "6"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD3
- name: ORDER_AMOUNT
  type: int64
  not_null: true
  default: "0"
  auto_increment: false
  support_update: true
  description: 订单金额
- name: TRANSACTION_AMOUNT
  type: int64
  not_null: true
  default: "0"
  auto_increment: false
  support_update: true
  description: FLD4(精确到分)
- name: BILLING_AMOUNT
  type: int64
  not_null: true
  default: "0"
  auto_increment: false
  support_update: true
  description: FLD6(精确到分，DCC由收单行提供该金额)
- name: TRANSMISSION_DATETIME
  type: string
  length: "10"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD7
- name: CONVERSION_RATE_BILLING
  type: string
  length: "8"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD10(卡组织汇率表示方式，参考卡组织规范。DCC情况下该汇率由银行提供（为包括了上浮部分的实际汇率）)
- name: STAN
  type: string
  length: "6"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD11
- name: LOCAL_TIME
  type: string
  length: "6"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD12
- name: LOCAL_DATE
  type: string
  length: "4"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD13
- name: MCC
  type: string
  length: "4"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD18
- name: ACQUIRING_INST_COUNTRY_CODE
  type: string
  length: "3"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD19
- name: POS_ENTRY_MODE
  type: string
  length: "3"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD22
- name: POS_CONDITION_CODE
  type: string
  length: "2"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD25
- name: POS_PIN_CAPTURE_CODE
  type: string
  length: "2"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD26
- name: ACQUIRING_INSTITUTION
  type: string
  length: "11"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD32
- name: RETRIEVAL_REFERENCE_NUMBER
  type: string
  length: "12"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD37(最后一位是集群单元ID号)
- name: TERMINAL_ID
  type: string
  length: "8"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD41
- name: MERCHANT_ID
  type: string
  length: "15"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD42，厦门国际构成：2位机构号+3位分行号+4位MCC+后2位机构号4位商户序号或6位商户序号；其他行构成：4位分行号+4位MCC+4位机构号（首位不为9）|3位顺序号或9|6位顺序号
- name: CARD_ACCEPTOR_LOCATION
  type: string
  length: "40"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD43
- name: ORDER_CURRENCY
  type: string
  length: "3"
  not_null: true
  auto_increment: false
  support_update: true
  description: 订单币种(联机参数)
- name: TRANSACTION_CURRENCY
  type: string
  length: "3"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD49(考虑境外外卡收单场景，该字段可能不为156)
- name: BILLING_CURRENCY
  type: string
  length: "3"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD51
- name: ADDITIONAL_POS_DATA
  type: string
  length: "26"
  not_null: true
  auto_increment: false
  support_update: true
  description: FLD60/DE61(VISA长度12，MC长度26)
- name: CARD_TYPE
  type: string
  length: "1"
  not_null: true
  auto_increment: false
  support_update: true
  description: 卡片类型(V-VISA；M-MC；J-JCB；A-AMEX；D-DC；C-CUP。@enumType=com.allinfinance.marcopolo.enums.CardType@)
- name: DCC_FLAG
  type: string
  length: "1"
  not_null: true
  auto_increment: false
  support_update: true
  description: DCC标记(1-DCC交易；0-非DCC交易。@enumType=com.allinfinance.marcopolo.enums.DccFlag@)
- name: KEY_DATETIME
  type: string
  length: "14"
  not_null: true
  auto_increment: false
  support_update: true
  description: 加密存储数据时的密钥版本(YYYYMMDDHHMMSS)
- name: DEVICE_TYPE
  type: string
  length: "20"
  not_null: true
  auto_increment: false
  support_update: true
  description: '设备备注字段(取值: WEB/ANDROID/IOS/CONSOLE等。@enumType=com.allinfinance.marcopolo.enums.DeviceType@)'
- name: INTERFACE_VERSION
  type: string
  length: "10"
  not_null: true
  auto_increment: false
  support_update: true
  description: 商户接口版本(取值：O1.0/O1.1/P1.0等 O代表线上，P代表线下)
- name: IP
  type: string
  length: "40"
  not_null: true
  auto_increment: false
  support_update: true
  description: 终端或持卡人浏览器IP地址(支持IP4和IP6，备注字段)
- name: RISK_SERVICE_FLAG
  type: string
  length: "1"
  not_null: true
  auto_increment: false
  support_update: true
  description: 商户上送的风险评估服务标记(0-不使用，1-使用。老系统必须取值1。@enumType=com.allinfinance.marcopolo.enums.RiskServiceFlag@)
- name: PAYMENT_TYPE
  type: string
  length: "1"
  not_null: true
  auto_increment: false
  support_update: true
  description: 支付类型(0-线下，1-Normal E-Commerce,2-3DS ,4- 控台手工发起。@enumType=com.allinfinance.marcopolo.enums.PaymentType@)
- name: CARDHOLDER_COUNTRY
  type: string
  length: "2"
  not_null: true
  auto_increment: false
  support_update: true
  description: 持卡人国籍(2位国家字母简写)
- name: CARDHOLDER_ADDRESS
  type: string
  length: "250"
  not_null: true
  auto_increment: false
  support_update: true
  description: 持卡人地址
- name: CARDHOLDER_NAME
  type: string
  length: "100"
  not_null: true
  auto_increment: false
  support_update: true
  description: 持卡人名称(加密存放)
- name: CARDHOLDER_STATE
  type: string
  length: "3"
  not_null: true
  auto_increment: false
  support_update: true
  description: 持卡人州省(需要符合ISO3166-2中State-code)
- name: CARDHOLDER_CITY
  type: string
  length: "50"
  not_null: true
  auto_increment: false
  support_update: true
  description: 持卡人城市
- name: CARDHOLDER_ZIP_CODE
  type: string
  length: "8"
  not_null: true
  auto_increment: false
  support_update: true
  description: 持卡人邮编
- name: CARDHOLDER_PHONE
  type: string
  length: "64"
  not_null: true
  auto_increment: false
  support_update: true
  description: 持卡人电话(加密存放)
- name: CARDHOLDER_EMAIL
  type: string
  length: "128"
  not_null: true
  auto_increment: false
  support_update: true
  description: 持卡人EMAIL(加密存放)
- name: RESERVED_1
  type: string
  length: "100"
  not_null: true
  auto_increment: false
  support_update: true
  description: 保留字段1
- name: RESERVED_2
  type: string
  length: "100"
  not_null: true
  auto_increment: false
  support_update: true
  description: 保留字段2
- name: INSERT_TIMESTAMP
  type: time
  not_null: true
  default: CURRENT_TIMESTAMP(6)
  auto_increment: false
  support_update: false
  description: 记录创建时间戳
  tag: ///@create
- name: INSERT_USER
  type: string
  length: "20"
  not_null: true
  auto_increment: false
  support_update: false
  description: 记录创建人(用户名或程序名)
primary_key:
- ID
- CLUSTER_ID
constraints:
- name: IDX_RRN
  columns:
  - RETRIEVAL_REFERENCE_NUMBER
  - MERCHANT_ID
  - TRANSACTION_TYPE
indexes:
- name: IDX_INSERT_TIMESTAMP
  columns:
  - INSERT_TIMESTAMP
- name: IDX_ORDER_ID
  columns:
  - ORDER_ID
  - MERCHANT_ID
self_query_rules:
  Xxxxx:
    select_fields: '*'
    page: false
    dynamic_sql: false
    sql_template: ""
    where:
      operator: AND
      conditions:
      - expr: RETRIEVAL_REFERENCE_NUMBER = @RRN

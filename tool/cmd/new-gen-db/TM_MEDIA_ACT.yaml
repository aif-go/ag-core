primary_key:
- SEQ
constraints:
- name: TM_MEDIA_ACT_UNIUQE_1
  columns:
  - CARDNO
  - BIZ_DATE
indexes:
- name: INDEX1_TM_MEDOA_ACT
  columns:
  - BIZ_DATE
  - ACTION_CD
- name: INDEX2_TM_MEDIA_ACT
  columns:
  - ADDRESS
  - BIZ_DATE
- name: 自定义脚本名字
  columns: []
self_query_rules:
  Xxxxx:
    select_fields: CARDNO,APP_ID,NEW_CARDNO
    page: true
    where:
      operator: OR
      conditions:
      - operator: AND
        conditions:
        - expr: BIZ_DATE = @BizDate
        - expr: ACTION_CD = @ActionCd
      - operator: AND
        conditions:
        - expr: ADDRESS = @Address
        - expr: BIZ_DATE in @BizDateSlice
  NoPageQuery:
    select_fields: CARDNO,APP_ID,NEW_CARDNO
    page: false
    where:
      operator: AND
      conditions:
      - expr: BIZ_DATE = @BizDate
      - expr: ACTION_CD = @ActionCd
